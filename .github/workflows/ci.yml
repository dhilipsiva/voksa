name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: wasm-pack build --release --target web crates/voksa-web
      - name: wasm size budget (warn-only until Phase 9)
        run: |
          wasm_file=$(ls crates/voksa-web/pkg/*_bg.wasm)
          size=$(stat -c%s "$wasm_file")
          budget=204800 # 200 KiB placeholder; enforced by `cargo xtask wasm-size` from Phase 9
          echo "wasm size: ${size} bytes (budget: ${budget} bytes)"
          if [ "$size" -gt "$budget" ]; then
            echo "::warning title=wasm size::${wasm_file} is ${size} bytes, over the ${budget}-byte budget (warn-only until Phase 9)"
          fi
