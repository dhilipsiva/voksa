name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Weekly deep-fuzz soak (fuzz-deep job below); manual trigger for on-demand runs.
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # cpal (voksa-cli, Phase 8) links libasound on Linux.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cpal (voksa-cli, Phase 8) links libasound on Linux.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace

  # Phase-11 W1: the proptest fuzz suites at 65536 cases (the `test` job above
  # already runs them at the 256-case default on every push). Weekly cron +
  # manual dispatch only — skipped on push/PR events.
  fuzz-deep:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo xtask fuzz

  # Phase-11 W2: rustdoc must build warning-free for the four shipping crates
  # (the vendored fork, testkit, and xtask are deliberately excluded).
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev
      - run: cargo doc --no-deps -p voksa-core -p voksa-engine-klattsch -p voksa-web -p voksa-cli
        env:
          RUSTDOCFLAGS: -D warnings

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      # binaryen provides wasm-dis for the xtask zero-imports assertion.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binaryen
      # Builds the web crate (wasm-opt -Oz), then hard-fails if the gzipped
      # wasm is over budget or declares any imports.
      - run: cargo xtask wasm-size

  # Phase-11 W3 (ADR 0002): the wasm32-wasip2 WIT component must build, be a
  # valid component, export the checked-in WIT surface, and stay under its
  # size canary.
  component:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools
      - run: cargo xtask component

  # C6 (ADR 0003): the release Dioxus tuning-console bundle must build and stay
  # under its gzip size canary. dioxus-cli is pinned to the workspace `dioxus`
  # version so dx's bundled wasm-bindgen matches the crate's.
  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.9
      - run: cargo check --target wasm32-unknown-unknown -p voksa-console
      # Builds the demo (dx build --release), then hard-fails if the gzipped
      # bundle wasm is over budget.
      - run: cargo xtask console-size

  # Advisory (CLAUDE.md decision gate: "browser CI flaky? → browser test
  # becomes advisory, native tests remain required"). The synth logic these
  # exercise is identical to the required native voksa-web unit tests, and the
  # wasm build is gated import-free + under budget by `wasm-build`. The
  # wasm-bindgen-test-runner ↔ chromedriver handshake is flaky across
  # environments (e.g. WSL); this job runs it in GitHub's reference Chrome but
  # does not block the merge.
  wasm-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - uses: nanasess/setup-chromedriver@v2
      - run: wasm-pack test --headless --chrome crates/voksa-web
