[workspace]
resolver = "3"
members = [
    "crates/voksa-core",
    "crates/voksa-cli",
    "crates/voksa-web",
    "xtask",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
voksa-core = { path = "crates/voksa-core" }
wasm-bindgen = "0.2.126"

# Size-optimized release profile (spec: the web crate). Applied workspace-wide
# because cargo only allows `panic` in the root [profile.release]; tests are
# unaffected (nextest builds with the dev/test profile).
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
